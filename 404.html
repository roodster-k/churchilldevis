<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée — Clinique Churchill</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F7F5F2;color:#1A1F2E;text-align:center;padding:24px}
      .wrap{max-width:480px}
      h1{font-family:'DM Serif Display',serif;font-size:6rem;font-weight:400;color:#0C8C7C;margin-bottom:8px}
      h2{font-family:'DM Serif Display',serif;font-size:1.6rem;font-weight:400;margin-bottom:16px}
      p{color:#5A5F73;margin-bottom:32px;line-height:1.7}
      a{display:inline-flex;align-items:center;gap:8px;background:#0C8C7C;color:#fff;padding:14px 28px;border-radius:50px;text-decoration:none;font-weight:600;font-size:.9rem;transition:all .3s}
      a:hover{background:#076B5F;transform:translateY(-2px)}
    </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>Page non trouvée</h2>
    <p>La page que vous recherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour retrouver nos services.</p>
    <a href="/">Retour à l'accueil</a>
  </div>
</body>
</html>
