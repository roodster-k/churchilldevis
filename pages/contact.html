<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Clinique Churchill</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/68e84b_c4b71655c40b40a4a3311ed126a14bde~mv2.png/v1/fill/w_96,h_100,al_c,lg_1,q_85,enc_avif,quality_auto/clinique-churchill_edited.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
    <style>
      :root, [data-theme="light"] {
        --bg: #FFFFFF;
        --bg-surface: #F9F7F4;
        --bg-card: #FFFFFF;
        --bg-elevated: #F4F1ED;
        --primary: #977532;
        --primary-light: #F7F0E4;
        --primary-dark: #7A5E28;
        --text: #1C1F26;
        --text-secondary: #4A4D58;
        --text-muted: #8E91A1;
        --border: rgba(28,31,38,0.08);
        --shadow-md: 0 4px 20px rgba(28,31,38,0.06);
        --radius: 20px;
        --nav-bg: rgba(255,255,255,0.92);
      }
      body {
        font-family:'DM Sans',sans-serif;
        background:var(--bg-surface);
        color:var(--text);
        line-height:1.6;
        margin:0;
        padding-top: 80px;
      }
      .nav {
        position:fixed; top:0; left:0; right:0; z-index:100;
        backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
        background:var(--nav-bg); border-bottom:1px solid var(--border);
      }
      .nav-inner { max-width:1100px; margin:0 auto; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; }
      .nav-logo img { height: 40px; width: auto; }
      .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
      .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; }
      .contact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow-md); }
      .info-item { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
      .info-item i { font-size: 1.5rem; color: var(--primary); background: var(--primary-light); padding: 10px; border-radius: 12px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
      .form-group input, .form-group textarea {
        width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border);
        background: var(--bg-surface); font-family: inherit; font-size: 1rem;
      }
      .btn-primary {
        background: var(--primary); color: white; border: none; padding: 16px 32px;
        border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer;
        width: 100%; transition: all 0.3s ease;
      }
    </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <img src="https://static.wixstatic.com/media/68e84b_8047b63e59d446a9bf3de6e263d38957~mv2.png/v1/fill/w_426,h_126,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/clinique-churchill.png" alt="Clinique Churchill">
    </a>
    <a href="../index.html" style="color:var(--text); font-weight:600; text-decoration:none; font-size:0.9rem;">Retour à l'accueil</a>
  </div>
</nav>

<main class="container">
    <h1 style="font-family:'DM Serif Display'; font-size: 2.5rem; text-align:center; margin-bottom: 40px;">Contactez-nous</h1>
    
    <div class="contact-grid">
        <div class="contact-info">
            <div class="info-item">
                <i class="ph-light ph-map-pin"></i>
                <div>
                    <strong>Adresse</strong>
                    <p>Avenue Winston Churchill 81,<br>1180 Bruxelles</p>
                </div>
            </div>
            <div class="info-item">
                <i class="ph-light ph-phone"></i>
                <div>
                    <strong>Téléphone</strong>
                    <p>+32 (0) 2 340 11 70</p>
                </div>
            </div>
            <div class="info-item">
                <i class="ph-light ph-envelope"></i>
                <div>
                    <strong>Email</strong>
                    <p>info@cliniquechurchill.be</p>
                </div>
            </div>
        </div>

        <div class="contact-card">
            <form>
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
                </div>
                <button type="submit" class="btn-primary">Envoyer le message</button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
